# Project-wide Gradle settings.
# TrueChrome — Computational Photography Camera

# JVM args for the Gradle daemon — generous heap for shader asset processing
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX migration (required)
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Enable non-transitive R classes for faster builds and smaller APK
android.nonTransitiveRClass=true

# Enable Gradle build cache for faster incremental builds
org.gradle.caching=true

# Enable parallel execution
org.gradle.parallel=true

# Enable configuration cache (Gradle 8+)
org.gradle.configuration-cache=true
